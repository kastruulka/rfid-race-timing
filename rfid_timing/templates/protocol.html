<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script>
      (() => {
        try {
          const theme = localStorage.getItem('rfid-theme');
          if (theme === 'light' || theme === 'dark') {
            document.documentElement.dataset.theme = theme;
          }
        } catch {}
      })();
    </script>
    <title>Генератор протоколов</title>
    <link rel="stylesheet" href="/static/css/web.css" />
    <link rel="stylesheet" href="/static/css/auth.css" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/protocol.css') }}" />
  </head>
  <body>
    <nav class="topnav">
      <div class="topnav-brand"><span>RFID</span> Хронометраж</div>
      <a href="/start-list">Стартовый лист</a>
      <a href="/">Хронометраж</a>
      <a href="/protocol" class="active">Протокол</a>
      <a href="/settings">Настройки</a>
      <a href="/judge">Судья</a>
      <div class="nav-spacer"></div>
      <div class="topnav-actions">
        <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Переключить тему">
          <span class="sun-icon" aria-hidden="true">☀</span>
          <span class="moon-icon" aria-hidden="true">☾</span>
        </button>
        <button class="btn btn-sm btn-login-trigger" id="login-btn" type="button">Войти</button>
        <button class="btn btn-sm btn-logout hidden" id="logout-btn" type="button">Выйти</button>
      </div>
    </nav>

    <div class="page">
      <div class="sidebar">
        <h2><span>Генератор</span> протоколов</h2>

        <div class="section-title">Охват</div>
        <div class="form-row">
          <label>Режим генерации</label>
          <select id="p-scope">
            <option value="single">Одна категория</option>
            <option value="selected">Выбранные категории</option>
            <option value="all">Все категории</option>
          </select>
        </div>
        <div class="form-row" id="p-category-single-wrap">
          <label>Категория</label>
          <select id="p-category">
            <option value="">-- Выберите категорию --</option>
          </select>
        </div>
        <div class="form-row hidden" id="p-category-multi-wrap">
          <label>Выбранные категории</label>
          <div class="category-pick-toolbar">
            <button class="btn btn-sm" type="button" id="btn-select-all-categories">Все</button>
            <button class="btn btn-sm" type="button" id="btn-clear-all-categories">Снять</button>
          </div>
          <div class="category-pick-list" id="p-category-multi"></div>
        </div>

        <div class="section-title">Метаданные гонки</div>
        <div class="form-row">
          <label>Название гонки</label>
          <input type="text" id="p-title" placeholder="Кубок города по велоспорту" />
        </div>
        <div class="form-row">
          <label>Подзаголовок</label>
          <input type="text" id="p-subtitle" placeholder="III этап, шоссейная гонка" />
        </div>
        <div class="form-grid">
          <div class="form-row">
            <label>Дата</label>
            <input type="text" id="p-date" placeholder="23 марта 2026" />
          </div>
          <div class="form-row">
            <label>Место</label>
            <input type="text" id="p-location" placeholder="г. Москва" />
          </div>
        </div>
        <div class="form-grid">
          <div class="form-row">
            <label>Погода</label>
            <input type="text" id="p-weather" placeholder="+15°C, ветер 3 м/с" />
          </div>
        </div>
        <div class="form-grid">
          <div class="form-row">
            <label>Главный судья</label>
            <input type="text" id="p-judge" placeholder="Иванов И.И." />
          </div>
          <div class="form-row">
            <label>Секретарь</label>
            <input type="text" id="p-secretary" placeholder="Петрова А.С." />
          </div>
        </div>

        <div class="section-title">Столбцы протокола</div>
        <div class="checkbox-group">
          <label class="cb-item"><input type="checkbox" id="col-place" checked /> Место</label>
          <label class="cb-item"><input type="checkbox" id="col-number" checked /> Номер</label>
          <label class="cb-item"><input type="checkbox" id="col-name" checked /> Имя</label>
          <label class="cb-item"><input type="checkbox" id="col-birth_year" /> Год рожд.</label>
          <label class="cb-item"><input type="checkbox" id="col-club" checked /> Команда</label>
          <label class="cb-item"><input type="checkbox" id="col-city" checked /> Город</label>
          <label class="cb-item"><input type="checkbox" id="col-start_time" /> Время старта</label>
          <label class="cb-item"><input type="checkbox" id="col-time" checked /> Время</label>
          <label class="cb-item"><input type="checkbox" id="col-gap" checked /> Отстав.</label>
          <label class="cb-item"
            ><input type="checkbox" id="col-warmup_lap" /> Разгонный круг</label
          >
          <label class="cb-item"><input type="checkbox" id="col-laps" /> Круги</label>
          <label class="cb-item"><input type="checkbox" id="col-speed" /> Ср. скорость</label>
          <label class="cb-item"><input type="checkbox" id="col-status" checked /> Статус</label>
        </div>

        <div class="actions-bar">
          <button class="btn btn-accent" id="btn-generate-preview">Предпросмотр</button>
          <button class="btn" id="btn-download-sync">↓ JSON Sync</button>
          <button class="btn btn-green" id="btn-download-pdf">↓ PDF</button>
        </div>
      </div>

      <div class="preview-area">
        <div class="preview-header">
          <span>Предпросмотр</span>
        </div>
        <div class="preview-scroll" id="preview-scroll">
          <div class="preview-empty" id="preview-empty">
            <div class="icon">📋</div>
            <div>Выберите категорию и нажмите «Предпросмотр»</div>
          </div>
        </div>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="{{ url_for('static', filename='js/ui/toast.js') }}"></script>
    <script src="{{ url_for('static', filename='js/ui/http.js') }}"></script>
    <script src="{{ url_for('static', filename='js/files/download.js') }}"></script>
    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
    <script src="{{ url_for('static', filename='js/protocol.js') }}"></script>
    <script>
      (() => {
        const authManager = window.createAuthManager({
          toast: window.showToast,
          loginButtonId: 'login-btn',
          logoutButtonId: 'logout-btn',
        });
        authManager.checkAuth();
      })();
    </script>
  </body>
</html>
